name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Wait for required checks to pass and auto-merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const requiredChecks = [
              "Code Quality (eslint & prettier)",
              "E2E Tests",
              "GitGuardian Security Checks"
            ];
            const pr_number = context.payload.pull_request.number;
            for (let attempt = 0; attempt < 60; attempt++) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
              });
              const { data: checksData } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });
              const checkStatuses = requiredChecks.map(name => {
                const check = checksData.check_runs.find(c => c.name === name);
                return check && check.conclusion === 'success';
              });
              
              const allChecksPassed = checkStatuses.every(Boolean);
              if (
                pr.state === 'open' &&
                (pr.mergeable_state === 'clean' || pr.mergeable_state === 'unstable') &&
                allChecksPassed
              ) {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr_number,
                  merge_method: 'squash',
                });
                console.log('PR automatycznie zmergowany!');
                return;
              } else {
                console.log(`Próba ${attempt + 1}. Statusy checków:`, checkStatuses);
                await new Promise(r => setTimeout(r, 30000));
              }
            }
            throw new Error('Nie udało się spełnić warunków auto-merge w wymaganym czasie.');
