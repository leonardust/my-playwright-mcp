name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Wait until all status checks pass and auto-merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Max 60 prób, po 30 sekund przerwy (~30 minut)
            const pr_number = context.payload.pull_request.number;
            for (let attempt = 0; attempt < 60; attempt++) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
              });
              // Sprawdź status checków
              const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });
              const allSuccess = combined.status === 'success';
              if (pr.mergeable_state === 'clean' && pr.state === 'open' && allSuccess) {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr_number,
                  merge_method: 'squash',
                });
                console.log('PR automatycznie zmergowany');
                return;
              } else {
                console.log(`Próba ${attempt + 1}: Mergeable: ${pr.mergeable_state}, Status checks: ${combined.status}`);
                // Poczekaj 30 sekund, zanim spróbujesz ponownie
                await new Promise(r => setTimeout(r, 30000));
              }
            }
            throw new Error('Nie udało się spełnić warunków do auto-merge (status checks/mergeable) w wymaganym czasie.');
